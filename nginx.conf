server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des fichiers texte (JS, CSS, polices JSON, SVG…)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Cache long pour les assets versionnés par Vite (nom haché)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache des polices
    location /fonts/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Sert le fichier demandé, sinon retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
